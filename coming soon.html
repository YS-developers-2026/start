<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YS developers</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <style>
        /* Base Styles & Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Hide the real cursor so the virtual one takes over */
            cursor: none !important;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #001f3f, #008080);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Virtual Cursor Implementation 
           Optimized for speed: transition none and hardware acceleration.
        */
        #virtual-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 32px; 
            height: auto;
            pointer-events: none; 
            z-index: 9999;
            /* Ensure zero lag movement */
            transition: none !important;
            will-change: transform;
            /* Start off-screen */
            transform: translate3d(-100px, -100px, 0); 
        }

        /* Particle Background */
        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .main-frame {
            position: relative;
            z-index: 10;
            width: 80%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            background-color: rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .image-wrapper:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.6);
        }

        .overlay-text {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            text-transform: lowercase;
            text-shadow: 3px 3px 8px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            letter-spacing: 2px;
        }

        .dots::after {
            content: '';
            display: inline-block;
            width: 40px;
            text-align: left;
            animation: dot-sequence 2s infinite steps(4);
        }

        @keyframes dot-sequence {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
            100% { content: ''; }
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: scale(0);
            animation: ripple-effect 0.8s linear;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes ripple-effect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <!-- The Virtual Cursor Image -->
    <img id="virtual-cursor" src="images/cursor.png" alt="cursor">

    <canvas id="particleCanvas"></canvas>

    <div class="main-frame">
        <div class="image-wrapper interactive-img">
            <img src="images/Ys.png" alt="YS Developers" onerror="this.style.display='none'; this.parentNode.style.background='rgba(255,255,255,0.1)'; this.parentNode.innerHTML += '<div style=\'color:white; text-align:center; padding:20px; pointer-events:none;\'>Coming Soon<br><small>Place Ys.png in /images/</small></div>'">
            <div class="overlay-text">
                coming soon<span class="dots"></span>
            </div>
        </div>
    </div>

    <script>
        const vCursor = document.getElementById('virtual-cursor');
        
        // Use requestAnimationFrame for the absolute fastest position updates
        let mouseX = -100;
        let mouseY = -100;

        function updateCursor() {
            vCursor.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0)`;
            requestAnimationFrame(updateCursor);
        }
        requestAnimationFrame(updateCursor);

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            // Swap images based on hover state
            const target = e.target;
            const isInteractive = target.closest('a, button, .interactive-img, .image-wrapper, [role="button"]');
            
            if (isInteractive) {
                if (!vCursor.src.includes('cursor2.png')) {
                    vCursor.src = 'images/cursor2.png';
                    vCursor.style.width = '40px'; 
                }
            } else {
                if (!vCursor.src.includes('cursor.png')) {
                    vCursor.src = 'images/cursor.png';
                    vCursor.style.width = '32px';
                }
            }
        });

        // Hide cursor when it leaves the window
        document.addEventListener('mouseleave', () => { vCursor.style.opacity = '0'; });
        document.addEventListener('mouseenter', () => { vCursor.style.opacity = '1'; });

        // Particle Background System
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 3.0; 
                this.speedY = (Math.random() - 0.5) * 3.0;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.init();
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            for (let i = 0; i < 120; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        initParticles();
        animate();

        window.addEventListener('mousedown', function(e) {
            const ripple = document.createElement('div');
            ripple.classList.add('ripple');
            document.body.appendChild(ripple);
            const size = 50;
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (e.clientX - size / 2) + 'px';
            ripple.style.top = (e.clientY - size / 2) + 'px';
            ripple.addEventListener('animationend', () => ripple.remove());
        });
    </script>
</body>
</html>
